[server]
id = test-fuzz
name = test-fuzz
service_name = test.service
read_buffer_size = 2048
recv_timeout = 1.0
idle_timeout = 0
logging_level = INFO
should_log_messages = false
tcp_keepalive_idle = 60
tcp_keepalive_interval = 10
tcp_keepalive_count = 6

[quirks]
normalize_lf_to_cr = false
normalize_crlf_to_cr = false
pad_msh2_encoding_chars = false
fix_truncated_msh = false
strip_leading_whitespace_from_fields = false
