[server]
id = test-quirks
name = test-quirks
service_name = test.service
read_buffer_size = 2048
recv_timeout = 1.0
idle_timeout = 0
logging_level = DEBUG
should_log_messages = true
tcp_keepalive_idle = 60
tcp_keepalive_interval = 10
tcp_keepalive_count = 6

[quirks]
normalize_lf_to_cr = true
normalize_crlf_to_cr = true
pad_msh2_encoding_chars = true
fix_truncated_msh = true
strip_leading_whitespace_from_fields = true
prepend_msh_if_missing = true
normalize_concatenated_messages = false
max_ack_field_len = 100
