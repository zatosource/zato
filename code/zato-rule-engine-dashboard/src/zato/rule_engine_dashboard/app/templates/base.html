<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rule engine - {% block title %}{% endblock %}</title>
    <style>
        :root {
            --color-bg: #f4f6f8;
            --color-surface: #ffffff;
            --color-border: #dde3ea;
            --color-text: #1f2933;
            --color-muted: #7b8794;
            --color-primary: #012845;
            --color-success-bg: #e3f4e8;
            --color-success-text: #1e6b3a;
            --color-error-bg: #fbe4e4;
            --color-error-text: #9b1c1c;
            --color-badge-admin-bg: #e0ecf7;
            --color-badge-admin-text: #12507b;
            --color-badge-user-bg: #eef1f4;
            --color-badge-user-text: #52606d;
            --color-badge-disabled-bg: #f9e8e8;
            --color-badge-disabled-text: #8f2020;
            --color-danger: #b4232a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            font-size: 15px;
        }
        header.topbar {
            background: var(--color-primary);
            color: #ffffff;
            padding: 14px 28px;
            font-size: 17px;
            font-weight: 600;
        }
        main.content {
            max-width: 1100px;
            margin: 28px auto;
            padding: 0 20px;
        }
        h1 {
            font-size: 21px;
            font-weight: 600;
            margin: 0 0 18px 0;
        }
        .messages { margin: 0 0 18px 0; padding: 0; list-style: none; }
        .messages li {
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .messages li.success { background: var(--color-success-bg); color: var(--color-success-text); }
        .messages li.error { background: var(--color-error-bg); color: var(--color-error-text); }
        table.list {
            width: 100%;
            border-collapse: collapse;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            overflow: hidden;
        }
        table.list th, table.list td {
            text-align: left;
            padding: 10px 14px;
            border-bottom: 1px solid var(--color-border);
        }
        table.list th {
            background: var(--color-bg);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--color-muted);
        }
        table.list tr:last-child td { border-bottom: none; }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 12.5px;
            font-weight: 600;
        }
        .badge.admin { background: var(--color-badge-admin-bg); color: var(--color-badge-admin-text); }
        .badge.user { background: var(--color-badge-user-bg); color: var(--color-badge-user-text); }
        .badge.active { background: var(--color-success-bg); color: var(--color-success-text); }
        .badge.disabled { background: var(--color-badge-disabled-bg); color: var(--color-badge-disabled-text); }
        .actions { display: flex; gap: 8px; }
        .actions form { margin: 0; }
        button.action {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 13.5px;
            cursor: pointer;
            color: var(--color-text);
        }
        button.action:hover { border-color: var(--color-muted); }
        button.action.danger { color: var(--color-danger); }
        button.action.danger:hover { border-color: var(--color-danger); }
        .muted { color: var(--color-muted); }
    </style>
</head>
<body>

    <header class="topbar">Rule engine</header>

    <main class="content">
        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

</body>
</html>
