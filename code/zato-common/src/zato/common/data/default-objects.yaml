# Default objects that every Zato server registers at startup.

channel_rest:
  - name: zato.ping
    url_path: /zato/ping
    service: demo.ping
    is_active: true
    is_internal: true

  - name: admin.invoke.json
    url_path: /zato/admin/invoke
    service: zato.service.invoke
    is_active: true
    is_internal: true

  - name: zato.api.invoke
    url_path: /zato/api/invoke/{service_name}
    service: zato.server.invoker
    is_active: true
    is_internal: true
