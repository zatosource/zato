global
    # Maximum concurrent connections across all frontends
    maxconn 32000

    # Use 4 threads pinned to CPUs 0-3
    nbthread 4
    cpu-map auto:1/1-4 0-3

# Default mode is TCP because the main frontend multiplexes
# HTTP and MLLP on the same port using protocol sniffing.
# Backends that handle HTTP must set mode http explicitly.
defaults
    mode tcp
    timeout connect 5s
    timeout client 90s
    timeout server 600s
    timeout check 600s

# --------------------------------------------------------
# HTTP backends
# --------------------------------------------------------

# Zato server API backend - handles all REST/SOAP/JSON traffic
backend server_backend
    mode http
    balance roundrobin
    http-reuse always

    # Health check: GET /zato/ping must return 200
    option httpchk
    http-check send meth GET uri /zato/ping
    http-check expect status 200

    # Forward the original client IP to the Zato server
    option forwardfor

    # Keep HTTP connections alive for reuse
    option http-keep-alive

    # Root path returns a static JSON health response
    acl is_root path /
    http-request return status 200 content-type application/json string '{"is_ok":true}' if is_root

    server server1 127.0.0.1:17010 check inter 5s fall 1 downinter 1s rise 1

# MCP streaming backend - SSE-capable for long-running MCP tool invocations
backend mcp_backend
    mode http
    balance roundrobin

    # Forward the original client IP to the Zato server
    option forwardfor

    # Do not buffer request body - pass chunks through immediately
    no option http-buffer-request

    # SSE streams can run for up to 1 hour before idle timeout
    timeout tunnel 3600s

    # Disable Nagle's algorithm so SSE chunks are sent immediately
    http-no-delay

    # Keep HTTP connections alive for reuse
    option http-keep-alive

    server server1 127.0.0.1:17010 check inter 5s fall 1 downinter 1s rise 1

# Web admin dashboard backend
backend dashboard_backend
    mode http
    balance roundrobin
    http-reuse always
    server dashboard1 127.0.0.1:8182

# --------------------------------------------------------
# MLLP backend
# --------------------------------------------------------

# HL7 MLLP channel backend - plain TCP, no HTTP
# The port is updated at runtime when the MLLP server starts
backend mllp_backend
    mode tcp
    server mllp1 127.0.0.1:31312

# --------------------------------------------------------
# Frontends
# --------------------------------------------------------

# Dashboard frontend - HTTP only, no protocol sniffing needed
frontend dashboard
    mode http
    bind 0.0.0.0:8183
    default_backend dashboard_backend

# Main entry point - multiplexes HTTP and MLLP on the same port.
# Runs in TCP mode so it can inspect the first byte of the payload
# before deciding which backend to use.
frontend main
    mode tcp
    bind 0.0.0.0:11223
    log global
    option logasap

    # Wait up to 5 seconds for the first byte to arrive
    tcp-request inspect-delay 5s

    # MLLP frames always start with 0x0B (vertical tab)
    acl is_mllp req.payload(0,1) -m bin 0b

    # MCP paths start with /mcp - route to the streaming-capable backend
    acl is_mcp req.payload(0,0) -m reg ^[A-Z]+\ /mcp

    # Accept the connection once we can classify it, or when the inspect delay expires
    tcp-request content accept if is_mllp or is_mcp or WAIT_END

    # Route MLLP traffic to the HL7 backend, MCP to the streaming backend, everything else to HTTP
    use_backend mllp_backend if is_mllp
    use_backend mcp_backend if is_mcp !is_mllp
    default_backend server_backend

# --------------------------------------------------------
# Stats and metrics
# --------------------------------------------------------

userlist stats-users
    user stats password "${Zato_Load_Balancer_Stats_Password}"

userlist metrics-users
    user metrics password "${Zato_Load_Balancer_Metrics_Password}"

# HAProxy stats and Prometheus metrics endpoint
listen stats
    mode http
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 30s
    http-request auth unless { http_auth(stats-users) }
    acl is_metrics_path path /metrics
    http-request auth realm "Metrics" if is_metrics_path !{ http_auth(metrics-users) }
    http-request use-service prometheus-exporter if { path /metrics }

# End of file
