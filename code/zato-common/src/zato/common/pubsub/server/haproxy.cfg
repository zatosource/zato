global
    # Maximum concurrent connections across all frontends
    maxconn 32000

    # Use 4 threads pinned to CPUs 0-3
    nbthread 4
    cpu-map auto:1/1-4 0-3

    # Log everything to stdout so haproxy -d shows access logs
    log stdout format raw local0 debug

defaults
    mode http
    log global
    option log-health-checks
    timeout connect 5s
    timeout client 90s
    timeout server 600s
    timeout check 600s
    timeout tarpit 60s

# --------------------------------------------------------
# HTTP backends
# --------------------------------------------------------

# Zato server API backend - handles all REST/SOAP/JSON traffic
backend server_backend
    mode http
    balance roundrobin
    http-reuse always

    # Health check: GET /zato/ping must return 200
    option httpchk
    http-check send meth GET uri /zato/ping
    http-check expect status 200

    # Forward the original client IP to the Zato server
    option forwardfor

    # Keep HTTP connections alive for reuse
    option http-keep-alive

    # Root path returns a static JSON health response
    acl is_root path /
    http-request return status 200 content-type application/json string '{"is_ok":true}' if is_root

    server server1 127.0.0.1:${Zato_Port_Server} check inter 5s fall 1 downinter 1s rise 1

# MCP streaming backend - SSE-capable for long-running MCP tool invocations
backend mcp_backend
    mode http
    balance roundrobin

    # Forward the original client IP to the Zato server
    option forwardfor

    # Do not buffer request body - pass chunks through immediately
    no option http-buffer-request

    # SSE streams can run for up to 1 hour before idle timeout
    timeout tunnel 3600s

    # Disable Nagle's algorithm so SSE chunks are sent immediately
    option http-no-delay

    # Keep HTTP connections alive for reuse
    option http-keep-alive

    server server1 127.0.0.1:${Zato_Port_Server} check inter 5s fall 1 downinter 1s rise 1

# Web admin dashboard backend
backend dashboard_backend
    mode http
    balance roundrobin
    http-reuse always
    server dashboard1 127.0.0.1:8182

# OpenAPI console backend - the console process listens on loopback
backend console_backend
    mode http
    balance roundrobin
    http-reuse always
    server console1 127.0.0.1:8088

# --------------------------------------------------------
# MLLP backend
# --------------------------------------------------------

# HL7 MLLP channel backend - plain TCP, no HTTP
# The port is updated at runtime when the MLLP server starts
backend mllp_backend
    mode tcp
    server mllp1 127.0.0.1:31312

# --------------------------------------------------------
# Internal HTTP backend (loopback from the TCP gateway)
# --------------------------------------------------------

backend http_internal
    mode tcp
    server loopback 127.0.0.1:11225 send-proxy

# --------------------------------------------------------
# Frontends
# --------------------------------------------------------

# Dashboard frontend - HTTP only, no protocol sniffing needed
frontend dashboard
    mode http
    bind 0.0.0.0:${Zato_Port_Dashboard}
    acl is_scanner_path path -i -f /opt/zato/env/qs-1/blocked-paths.txt
    http-request tarpit deny_status 403 if is_scanner_path
    default_backend dashboard_backend

# OpenAPI console frontend - HTTP only, no protocol sniffing needed
frontend console
    mode http
    bind 0.0.0.0:${Zato_Port_OpenAPI_Console}
    acl is_scanner_path path -i -f /opt/zato/env/qs-1/blocked-paths.txt
    http-request tarpit deny_status 403 if is_scanner_path
    default_backend console_backend

# Main entry point - REST and MLLP on one port
# MLLP is detected by the first bytes: 0x0B (standard framing) or bare "MSH"
frontend main
    mode tcp
    bind 0.0.0.0:${Zato_Port_Load_Balancer}

    # Connection-level access log with client IP, timers, backend, byte count
    log-format "%ci:%cp [%t] %ft %b/%s %Tw/%Tc/%Tt %B %ts %ac/%fc/%bc/%sc %sq/%bq"

    # Maximum time to wait for the first byte before routing - clients that send data
    # are routed immediately, the delay only caps how long a silent connection may wait,
    # and it needs to be long enough for remote MLLP clients whose first byte
    # arrives a round-trip after the connection is established
    tcp-request inspect-delay ${Zato_Load_Balancer_Inspect_Delay}
    tcp-request content accept if { req.len gt 0 }

    acl is_mllp req.payload(0,1) -m bin 0b
    acl is_mllp_bare req.payload(0,3) -m str MSH

    use_backend mllp_backend if is_mllp or is_mllp_bare
    default_backend http_internal

# HTTP frontend - receives traffic from the TCP gateway via loopback
frontend http
    mode http
    bind 127.0.0.1:11225 accept-proxy
    option httplog

    acl is_scanner_path path -i -f /opt/zato/env/qs-1/blocked-paths.txt
    http-request tarpit deny_status 403 if is_scanner_path

    # Client certificate headers are only ever set by the TLS frontend that verified
    # the certificate - whatever arrived here, over plaintext, is spoofed by definition
    http-request del-header X-Zato-SSL-Client-Verify
    http-request del-header X-Zato-SSL-Client-SHA256
    http-request del-header X-Zato-SSL-Client-Subject-DN

    acl is_mcp path_beg /mcp
    use_backend mcp_backend if is_mcp
    default_backend server_backend

# --------------------------------------------------------
# Stats and metrics
# --------------------------------------------------------

userlist stats-users
    user stats password "${Zato_Load_Balancer_Stats_Password}"

userlist metrics-users
    user metrics password "${Zato_Load_Balancer_Metrics_Password}"

# HAProxy stats and Prometheus metrics endpoint
listen stats
    mode http
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 30s
    http-request auth unless { http_auth(stats-users) }
    acl is_metrics_path path /metrics
    http-request auth realm "Metrics" if is_metrics_path !{ http_auth(metrics-users) }
    http-request use-service prometheus-exporter if { path /metrics }

# End of file
