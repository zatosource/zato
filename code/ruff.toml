line-length    = 160
target-version = "py310"

extend-exclude = [
    "**/brython",
    "**/playwright_/*.py",
    "**/src/zato/common/ext",
    "**/src/zato/common/py23_",
]

[lint.flake8-quotes]
inline-quotes    = "single"
multiline-quotes = "single"
docstring-quotes = "double"

[format]
quote-style = "single"
