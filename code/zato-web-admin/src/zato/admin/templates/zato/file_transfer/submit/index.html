{% extends "zato/settings-base.html" %}

{% block page_title %}Submit a file{% endblock %}

{% block extra_page_css %}
<link rel="stylesheet" type="text/css" href="/static/css/file_transfer.css">
<style>
.settings-panel { max-width: 400px; }
</style>
{% endblock %}

{% block extra_page_js %}
<script type="text/javascript" src="/static/js/file-transfer-submit.js" nonce="{{ CSP_NONCE }}"></script>
{% endblock %}

{% block left_content %}
<div class="ft-submit-page">
<h3>Submit a file</h3>
<div class="progress-panel">
    <div class="info-container">
        <div class="info-row">
            <div class="info-label">File</div>
            <div class="info-value">
                <input type="file" id="file-input">
            </div>
        </div>
    </div>
    <div class="button-container">
        <div class="button-wrapper">
            <img src="/static/gfx/spinner.svg" class="button-spinner" id="submit-spinner">
        </div>
        <button class="action-button" id="submit-button">Submit</button>
    </div>
</div>
</div>
{% endblock %}

{% block sidebar %}{% endblock %}
