{% extends "zato/index.html" %}
{% load extras %}

{% block page_title %}File transfer - Generate PGP keypair{% endblock %}

{% block content %}
<div class="content-wrap">
    <nav class="breadcrumb">
        <a href="{% url 'main-page' %}">Zato</a> &rsaquo;
        <a href="{% url 'file-transfer-pgp-key' %}">PGP keys</a> &rsaquo;
        <span>Generate</span>
    </nav>

    <a href="{% url 'file-transfer-pgp-key' %}" class="btn btn-default" style="margin-bottom:12px">&larr; Back</a>

    <h2>Generate PGP keypair</h2>

    <form method="post" action="">
        {% csrf_token %}

        <div class="form-group" style="max-width:400px">
            <label>Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="form-group" style="max-width:400px">
            <label>Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="form-group" style="max-width:200px">
            <label>Algorithm</label>
            <select name="algorithm" class="form-control">
                <option value="RSA">RSA</option>
                <option value="DSA">DSA</option>
            </select>
        </div>

        <div class="form-group" style="max-width:200px">
            <label>Key size</label>
            <select name="key_size" class="form-control">
                <option value="4096">4096</option>
                <option value="2048">2048</option>
            </select>
        </div>

        <div class="form-group" style="max-width:400px">
            <label>Passphrase (optional)</label>
            <input type="password" name="passphrase" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">Generate</button>
        <a href="{% url 'file-transfer-pgp-key' %}" class="btn btn-default">Cancel</a>
    </form>
</div>
{% endblock %}
