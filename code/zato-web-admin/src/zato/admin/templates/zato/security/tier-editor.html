{% extends "zato/index.html" %}

{% block html_title %}Quota tier - {{ tier_name }}{% endblock %}

{% block "extra_css" %}
    <link rel="stylesheet" type="text/css" href="/static/css/status-message.css">
    <link rel="stylesheet" type="text/css" href="/static/css/shared/dropdown-menu.css">
    <link rel="stylesheet" type="text/css" href="/static/css/rate-limiting.css">
{% endblock %}

{% block "extra_js" %}
    <script nonce="{{ CSP_NONCE }}" type="text/javascript" src="/static/sortable/Sortable.min.js"></script>
    <script nonce="{{ CSP_NONCE }}" type="text/javascript" src="/static/lucide/lucide.min.js"></script>
    <script nonce="{{ CSP_NONCE }}" type="text/javascript" src="/static/js/common.js"></script>
    <script nonce="{{ CSP_NONCE }}" type="text/javascript" src="/static/js/rate-limiting.js"></script>
    <script nonce="{{ CSP_NONCE }}" type="text/javascript" src="/static/js/security/tier.js"></script>

    <script nonce="{{ CSP_NONCE }}">
    $(document).ready(function() {
        $.fn.zato.rate_limiting.init('rate-limiting-container', 'edit', '{{ tier_id }}', '/zato/security/tier');
        {% if rules_json and rules_json != '[]' %}
        $.fn.zato.rate_limiting.load_rules('rate-limiting-container', {{ rules_json|safe }});
        {% endif %}
    });
    </script>
{% endblock %}

{% block "content" %}

<!-- screenshot: quota-tier-editor.webp - The quota tier editor with name, description and the rate-limiting rule builder -->

<div id="markup">
<h2 class="zato">Quota tier | <a href="/zato/security/tier/?cluster={{ cluster_id }}">Quota tiers</a> | {{ tier_name }}</h2>

<table class="form-data">
    <tr>
        <td style="vertical-align:middle;width:10%">
            <label for="tier-name">Name</label>
        </td>
        <td>
            <input type="text" id="tier-name" class="required" style="width:40%" value="{{ tier_name }}" />
        </td>
    </tr>
    <tr>
        <td style="vertical-align:middle;width:10%">
            <label for="tier-description">Description</label>
        </td>
        <td>
            <input type="text" id="tier-description" style="width:70%" value="{{ tier_description }}" />
        </td>
    </tr>
</table>

<input type="hidden" id="tier-id" value="{{ tier_id }}" />

<div class="rate-limiting-container" id="rate-limiting-container">
</div>

<div class="rate-limiting-actions">
    <span class="rate-limiting-button-add" onclick="$.fn.zato.rate_limiting.add_rule('rate-limiting-container')">+ Add row</span>
    <span class="rate-limiting-save-group">
        <span class="status-message" id="rate-limiting-status"></span>
        <input type="submit" value="Save" onclick="$.fn.zato.security.tier.save('rate-limiting-container')" />
    </span>
</div>

</div>

{% endblock %}
