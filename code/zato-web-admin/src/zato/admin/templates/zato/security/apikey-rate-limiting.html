{% extends "zato/index.html" %}

{% block html_title %}Rate limiting - {{ entity_name }}{% endblock %}

{% block "extra_css" %}
    <link rel="stylesheet" type="text/css" href="/static/css/status-message.css">
    <link rel="stylesheet" type="text/css" href="/static/css/shared/dropdown-menu.css">
    <link rel="stylesheet" type="text/css" href="/static/css/rate-limiting.css">
{% endblock %}

{% block "extra_js" %}
    <script nonce="{{ CSP_NONCE }}" type="text/javascript" src="/static/sortable/Sortable.min.js"></script>
    <script nonce="{{ CSP_NONCE }}" type="text/javascript" src="/static/lucide/lucide.min.js"></script>
    <script nonce="{{ CSP_NONCE }}" type="text/javascript" src="/static/js/common.js"></script>
    <script nonce="{{ CSP_NONCE }}" type="text/javascript" src="/static/js/rate-limiting.js"></script>

    <script nonce="{{ CSP_NONCE }}">
    $(document).ready(function() {
        $.fn.zato.rate_limiting.init('rate-limiting-container', 'edit', '{{ entity_id }}', '/zato/security/apikey/rate-limiting');
        {% if rules_json and rules_json != '[]' %}
        $.fn.zato.rate_limiting.load_rules('rate-limiting-container', {{ rules_json|safe }});
        {% endif %}
        $.fn.zato.rate_limiting.init_tier_select('rate-limiting-container');
    });
    </script>
{% endblock %}

{% block "content" %}

<!-- screenshot: quota-tier-select-definition.webp - The quota tier select on a security definition's rate limiting page -->

<div id="markup">
<h2 class="zato">Rate limiting | <a href="{% url 'security-apikey' %}?cluster={{ cluster_id }}">API keys</a> | {{ entity_name }}</h2>

<table class="rate-limiting-form">
    <tr>
        <td class="rate-limiting-form-label">
            <label for="quota-tier-select">Quota tier</label>
        </td>
        <td>
            <select id="quota-tier-select" class="noChosen">
                <option value="">Custom rules</option>
                {% for tier in tier_list %}
                <option value="{{ tier.id }}"{% if tier.id == quota_tier %} selected{% endif %}>{{ tier.name }}</option>
                {% endfor %}
            </select>
        </td>
    </tr>
</table>

<div class="rate-limiting-container" id="rate-limiting-container">
</div>

<div class="rate-limiting-actions">
    <span class="rate-limiting-button-add" onclick="$.fn.zato.rate_limiting.add_rule('rate-limiting-container')">+ Add row</span>
    <span class="rate-limiting-save-group">
        <span class="status-message" id="rate-limiting-status"></span>
        <input type="submit" value="Save" onclick="$.fn.zato.rate_limiting.save('rate-limiting-container')" />
    </span>
</div>

</div>

{% endblock %}
