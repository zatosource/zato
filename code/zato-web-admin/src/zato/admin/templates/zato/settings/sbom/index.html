{% extends "zato/settings/textarea-page.html" %}

{% block textarea_page_js %}
<script type="text/javascript" src="/static/js/sbom.js" nonce="{{ CSP_NONCE }}"></script>
{% endblock %}

{% block content_rows %}
<div class="info-container textarea-settings-container">
    <div class="info-row textarea-row">
        <div class="info-label">
            {{ page_config.textarea_label }}
            <span class="copy-icon" data-copy="{{ page_config.textarea_id }}" title="Copy to clipboard">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            </span>
        </div>
        <div class="info-value textarea-value">
            <textarea id="{{ page_config.textarea_id }}" readonly>{{ textarea_content }}</textarea>
        </div>
    </div>
</div>
{% endblock %}

{% block buttons %}{% endblock %}

{% block action_steps %}{% endblock %}
