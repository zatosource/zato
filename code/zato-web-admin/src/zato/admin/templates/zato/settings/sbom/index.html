{% extends "zato/settings/textarea-page.html" %}

{% block textarea_page_js %}
<script type="text/javascript" src="/static/js/sbom.js" nonce="{{ CSP_NONCE }}"></script>
{% endblock %}

{% block content_rows %}
<div class="info-container textarea-settings-container">
    <div class="info-row textarea-row">
        <div class="info-value textarea-value">
            <textarea id="{{ page_config.textarea_id }}" readonly>{{ textarea_content }}</textarea>
        </div>
    </div>
</div>
{% endblock %}

{% block buttons %}
<div class="button-container">
    <button class="action-button" id="copy-button">
        {{ page_config.copy_button_label }}
    </button>
</div>
{% endblock %}

{% block action_steps %}{% endblock %}
