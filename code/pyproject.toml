[tool.pytest.ini_options]
markers = [
    "perftest: long-running performance tests, skipped by default",
]
addopts = "-m 'not perftest'"
log_cli = true
log_cli_level = "DEBUG"
log_cli_format = "%(asctime)s - %(levelname)s - %(process)d:%(threadName)s - %(name)s:%(lineno)d - %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"
filterwarnings = [
    "ignore:'urllib3\\[secure\\]' extra is deprecated:DeprecationWarning",
]

[tool.pyright]
extraPaths = [
    "./lib/python3.8/site-packages",
    "./lib/python3.12/site-packages",
    "./src",
    "./zato-agent/src",
    "./zato-cli/src",
    "./zato-common/src",
    "./zato-distlock/src",
    "./zato-hl7/src",
    "./zato-server/src",
    "./zato-web-admin/src",
]
