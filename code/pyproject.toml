[tool.pytest.ini_options]
markers = [
    "perftest: long-running performance tests, skipped by default",
]
addopts = "-m 'not perftest'"

[tool.pyright]
extraPaths = [
    "./lib/python3.8/site-packages",
    "./zato-agent/src",
    "./zato-cli/src",
    "./zato-common/src",
    "./zato-distlock/src",
    "./zato-hl7/src",
    "./zato-server/src",
    "./zato-web-admin/src",
]
