[tool.pytest.ini_options]
markers = [
    "perftest: long-running performance tests, skipped by default",
    "expect_log_errors: test intentionally triggers server log errors matching the given patterns",
]
addopts = "-m 'not perftest' --import-mode=importlib"
log_cli = true
log_cli_level = "DEBUG"
log_cli_format = "%(asctime)s - %(levelname)s - %(process)d:%(threadName)s - %(name)s:%(lineno)d - %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"
filterwarnings = [
    "ignore:'urllib3\\[secure\\]' extra is deprecated:DeprecationWarning",
    "ignore:'crypt' is deprecated:DeprecationWarning",
    "ignore:distutils Version classes are deprecated:DeprecationWarning",
    "ignore:Dialect postgresql.pg8000 will not make use of SQL compilation caching:sqlalchemy.exc.SAWarning",
]
