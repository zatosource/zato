security:

  - name: test.pubsub.publisher
    type: basic_auth
    username: test.pubsub.publisher
    password: "{{publisher_password}}"

  - name: test.pubsub.pusher.a
    type: basic_auth
    username: test.pubsub.pusher.a
    password: "{{pusher_a_password}}"

pubsub_topic:

  - name: clear.push.topic.1
  - name: clear.push.topic.2

pubsub_permission:

  - security: test.pubsub.publisher
    pub:
      - clear.**

  - security: test.pubsub.pusher.a
    sub:
      - clear.**

pubsub_subscription:

  - security: test.pubsub.pusher.a
    delivery_type: push
    push_type: service
    push_service_name: demo.echo
    topic_list:
      - clear.push.topic.1
      - clear.push.topic.2
