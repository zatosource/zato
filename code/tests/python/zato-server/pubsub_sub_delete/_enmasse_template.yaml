security:

  - name: test.sd.publisher
    type: basic_auth
    username: test.sd.publisher
    password: "{{publisher_password}}"

  - name: test.sd.subscriber
    type: basic_auth
    username: test.sd.subscriber
    password: "{{subscriber_password}}"

pubsub_topic:

  - name: sd.topic.single
  - name: sd.topic.multi.first
  - name: sd.topic.multi.second

pubsub_permission:

  - security: test.sd.publisher
    pub:
      - sd.**

  - security: test.sd.subscriber
    sub:
      - sd.**

pubsub_subscription:

  - security: test.sd.subscriber
    delivery_type: pull
    topic_list:
      - sd.topic.single

  - security: test.sd.subscriber
    delivery_type: pull
    topic_list:
      - sd.topic.multi.first
      - sd.topic.multi.second
