sql:

  - name: test.sql.snowflake
    type: snowflake
    host: testaccount
    port: 443
    db_name: testdb
    username: test_user
    password: "{{snowflake_password}}"
    extra: protocol=http;host=127.0.0.1;port={{snowflake_port}};warehouse=COMPUTE_WH;role=ANALYST;schema=PUBLIC;login_timeout=10;network_timeout=10

  - name: test.sql.redshift
    type: redshift
    host: 127.0.0.1
    port: {{redshift_port}}
    db_name: testdb
    username: test_user
    password: "{{redshift_password}}"
    extra: ssl=False
