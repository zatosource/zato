security:

  - name: test.revoke.publisher
    type: basic_auth
    username: test.revoke.publisher
    password: "{{publisher_password}}"

  - name: test.revoke.subscriber
    type: basic_auth
    username: test.revoke.subscriber
    password: "{{subscriber_password}}"

pubsub_topic:

  - name: crm.event1
  - name: billing.invoice1
  - name: audit.login
  - name: audit.logout

pubsub_permission:

  - security: test.revoke.publisher
    pub:
      - crm.**
      - billing.**
      - audit.**

  - security: test.revoke.subscriber
    sub:
      - crm.**

  - security: test.revoke.subscriber
    sub:
      - billing.**

  - security: test.revoke.subscriber
    sub:
      - audit.**

pubsub_subscription:

  - security: test.revoke.subscriber
    delivery_type: pull
    topic_list:
      - crm.event1
      - billing.invoice1
      - audit.login
      - audit.logout
