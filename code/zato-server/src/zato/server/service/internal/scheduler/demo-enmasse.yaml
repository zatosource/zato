scheduler:

  - name: crm.sync-contacts
    service: demo.sleep
    job_type: interval_based
    seconds: 4
    is_active: true
    extra: '{"seconds": 4, "source": "crm", "object_type": "contact", "direction": "inbound"}'

  - name: crm.sync-accounts
    service: demo.sleep
    job_type: interval_based
    seconds: 5
    is_active: true
    extra: '{"seconds": 5, "source": "crm", "object_type": "account", "direction": "inbound", "batch_size": 200}'

  - name: crm.push-cases
    service: demo.sleep
    job_type: interval_based
    seconds: 7
    is_active: true
    extra: '{"seconds": 7, "source": "crm", "object_type": "case", "direction": "outbound", "priority": "normal"}'

  - name: crm.reconcile-invoices
    service: demo.sleep
    job_type: interval_based
    seconds: 10
    is_active: true
    extra: '{"seconds": 10, "source": "billing", "object_type": "invoice", "direction": "bidirectional"}'

  - name: crm.purge-stale-sessions
    service: demo.sleep
    job_type: interval_based
    seconds: 8
    is_active: true
    extra: '{"seconds": 3, "action": "purge", "target": "sessions", "max_age_hours": 48}'

  - name: crm.slow-sftp-export
    service: demo.sleep
    job_type: interval_based
    seconds: 6
    is_active: true
    extra: '{"seconds": 20, "host": "sftp.partner.example.com", "path": "/outbound/invoices"}'
