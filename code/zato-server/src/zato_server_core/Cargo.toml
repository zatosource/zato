[package]
name = "zato_server_core"
version = "0.1.0"
edition = "2021"

[lib]
name = "zato_server_core"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.28.3", features = ["extension-module"] }
httparse = "1"
libc = "0.2.184"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
